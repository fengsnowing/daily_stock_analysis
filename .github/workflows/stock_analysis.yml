name: 股票智能分析

on:
  schedule:
    # UTC时间0:00 = 北京时间8:00
    # 仅在工作日执行（周一至周五）
    - cron: '0 0 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 执行股票分析
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        STOCK_LIST: ${{ secrets.STOCK_LIST || '600111,002466,603019,603881,300895,002053,688158,000977,601919' }}
      run: |
        echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env
        echo "OPENAI_BASE_URL=$OPENAI_BASE_URL" >> .env
        echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> .env
        echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> .env
        echo "STOCK_LIST=$STOCK_LIST" >> .env
        python main.py --stocks $STOCK_LIST --single-notify

    - name: 上传报告
      uses: actions/upload-artifact@v3
      with:
        name: stock-analysis-report-${{ github.run_number }}
        path: reports/
        retention-days: 30
